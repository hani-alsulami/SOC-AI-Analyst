version: '3.8'

# ============================================================================
# AI-SOC Integrated Stack
# ============================================================================
#
# AI services standalone deployment (ML inference, alert triage, RAG,
# Redis, ChromaDB, Ollama), rebuilt from source. Useful for running/testing
# the AI layer without the full SIEM/SOAR stacks.
#
# For a normal end-to-end deployment, prefer docker-compose/ai-services.yml
# (used together with phase1-siem-core.yml) — see deploy-ai-soc.sh.
#
# ⚠️  api-gateway and webhook-handler below are NOT IMPLEMENTED. They build
# from services/gateway and services/webhooks, which do not exist in this
# repository — they're gated behind the "gateway" Compose profile so a
# plain `docker compose up` does not try to build them. Enable that profile
# only once those services exist, or remove the two blocks entirely.
#
# Author: HOLLOWED_EYES
# Mission: OPERATION PIPELINE-INTEGRATION
# ============================================================================

services:
  # ==========================================================================
  # API Gateway - Unified Entry Point
  # NOT IMPLEMENTED: services/gateway does not exist yet. Gated behind the
  # "gateway" profile — run with `--profile gateway` once it's built.
  # ==========================================================================
  api-gateway:
    profiles: ["gateway"]
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: ai-soc-gateway
    hostname: api-gateway
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - LOG_LEVEL=INFO
      - GATEWAY_TIMEOUT=30
    networks:
      - ai-network
      - siem-frontend
      - soar-frontend
    depends_on:
      ml-inference:
        condition: service_healthy
      alert-triage:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ==========================================================================
  # Webhook Handler - Integration Orchestration
  # NOT IMPLEMENTED: services/webhooks does not exist yet. Gated behind the
  # "gateway" profile — run with `--profile gateway` once it's built.
  # ==========================================================================
  webhook-handler:
    profiles: ["gateway"]
    build:
      context: ../services/webhooks
      dockerfile: Dockerfile
    container_name: webhook-handler
    hostname: webhook-handler
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      - LOG_LEVEL=INFO
      - PIPELINE_WORKERS=10
    networks:
      - ai-network
      - siem-frontend
      - soar-frontend
    depends_on:
      - api-gateway
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ==========================================================================
  # ML Inference API - IDS Prediction
  # ==========================================================================
  ml-inference:
    build:
      context: ../ml_training
      dockerfile: Dockerfile
    container_name: ml-inference
    hostname: ml-inference
    restart: unless-stopped
    ports:
      - "8500:8000"
    volumes:
      - ../models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models
      - LOG_LEVEL=INFO
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  # ==========================================================================
  # Alert Triage Service - LLM Analysis
  # ==========================================================================
  alert-triage:
    build:
      context: ../services/alert-triage
      dockerfile: Dockerfile
    container_name: alert-triage
    hostname: alert-triage
    restart: unless-stopped
    ports:
      - "8100:8000"
    environment:
      - TRIAGE_OLLAMA_HOST=http://ollama-server:11434
      - TRIAGE_PRIMARY_MODEL=llama3.1:8b
      - TRIAGE_FALLBACK_MODEL=llama3.1:8b
      - ML_INFERENCE_URL=http://ml-inference:8000
      - RAG_SERVICE_URL=http://rag-service:8000
      - ML_ENABLED=true
      - RAG_ENABLED=true
      - LOG_LEVEL=INFO
    networks:
      - ai-network
    depends_on:
      ml-inference:
        condition: service_healthy
      ollama-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ==========================================================================
  # RAG Service - Knowledge Retrieval
  # ==========================================================================
  rag-service:
    build:
      context: ../services/rag-service
      dockerfile: Dockerfile
    container_name: rag-service
    hostname: rag-service
    restart: unless-stopped
    ports:
      - "8300:8000"
    environment:
      - RAG_CHROMADB_HOST=chromadb
      - RAG_CHROMADB_PORT=8000
      - RAG_OLLAMA_HOST=http://ollama-server:11434
      - LOG_LEVEL=INFO
    networks:
      - ai-network
    depends_on:
      - chromadb
      - ollama-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ==========================================================================
  # Redis - Message Queue & Caching
  # ==========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ==========================================================================
  # ChromaDB - Vector Database
  # ==========================================================================
  chromadb:
    image: chromadb/chroma:0.5.5  # Pinned for reproducibility
    container_name: chromadb
    hostname: chromadb
    restart: unless-stopped
    ports:
      - "8200:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # ==========================================================================
  # Ollama - LLM Inference Server
  # ==========================================================================
  ollama-server:
    image: ollama/ollama:0.3.14  # Pinned for reproducibility
    container_name: ollama-server
    hostname: ollama-server
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'

# ============================================================================
# Networks
# ============================================================================

networks:
  ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
    labels:
      - "com.ai-soc.network=ai-services"

  siem-frontend:
    external: true
    name: siem-frontend
    # Connects to Wazuh stack

  soar-frontend:
    external: true
    name: soar-frontend
    # Connects to TheHive/Shuffle stack

# ============================================================================
# Volumes
# ============================================================================

volumes:
  chromadb-data:
    driver: local
    labels:
      - "com.ai-soc.volume=chromadb"

  ollama-models:
    driver: local
    labels:
      - "com.ai-soc.volume=ollama"

  redis-data:
    driver: local
    labels:
      - "com.ai-soc.volume=redis"

# ============================================================================
# Deployment Instructions
# ============================================================================
#
# 1. Deploy the AI services (builds ml-inference, alert-triage, rag-service
#    from source; requires siem-frontend/soar-frontend external networks if
#    you also run those stacks — otherwise remove those two network entries
#    below):
#    docker compose -f docker-compose/integrated-stack.yml up -d
#
# 2. Pull Ollama model (first time):
#    docker exec -it ollama-server ollama pull llama3.1:8b
#
# 3. Verify deployment:
#    docker compose -f docker-compose/integrated-stack.yml ps
#    curl http://localhost:8100/health
#
# 4. Access services:
#    - ML Inference: http://localhost:8500/docs
#    - Alert Triage: http://localhost:8100/docs
#    - RAG Service: http://localhost:8300/docs
#    - Ollama API: http://localhost:11434/api/tags
#    - Redis: localhost:6379
#    - ChromaDB: http://localhost:8200
#
# api-gateway and webhook-handler are NOT IMPLEMENTED (see warning at top of
# this file) and are excluded unless you run with `--profile gateway`.
#
# ============================================================================
